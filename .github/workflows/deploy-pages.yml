name: Deploy to GitHub Pages

# Vercel을 주 배포로 사용. GitHub Pages는 수동 실행만.
# (활성화 원하면: 저장소 Settings → Pages → Source: GitHub Actions 설정 후 Actions 탭에서 수동 실행)
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # 서브패스 배포(예: user.github.io/wimalog)일 때 BASE_PATH=/wimalog/ 로 설정
          BASE_PATH: ${{ vars.BASE_PATH || '/' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
