<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>감량로그</title>
    <script>
      // GitHub Pages SPA 트릭: 404를 index.html로 리다이렉트하면서 경로 보존
      var l = window.location;
      var basePath = l.pathname.replace(/\/[^/]*$/, '/');
      l.replace(basePath + '#/' + l.pathname.slice(basePath.length) + l.search);
    </script>
  </head>
  <body></body>
</html>
